name: Clean Up Closed OffMap Submission

on:
  issues:
    types:
      - closed

concurrency:
  group: offmap-cleanup-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  cleanup:
    name: Remove abandoned submission drafts
    if: >-
      !contains(github.event.issue.labels.*.name, 'draft-created')
      && !contains(github.event.issue.labels.*.name, 'processed')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}

    steps:
      # ======================================================
      # VALIDATE EVENT DATA
      # ======================================================

      - name: Validate issue number
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$ISSUE_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::Issue number must be a positive integer."
            exit 1
          fi

      # ======================================================
      # CLOSE OPEN GENERATED PULL REQUESTS
      # ======================================================

      - name: Close generated pull requests
        shell: bash
        run: |
          set -euo pipefail

          current_branch="automated-discovery/issue-${ISSUE_NUMBER}"
          legacy_prefix="${current_branch}-"

          mapfile -t pull_requests < <(
            gh pr list \
              --repo "$REPO" \
              --state open \
              --limit 100 \
              --json number,headRefName \
              --jq \
              ".[] |
              select(
                (.headRefName == \"${current_branch}\")
                or
                (.headRefName | startswith(\"${legacy_prefix}\"))
              ) |
              .number"
          )

          if [[ "${#pull_requests[@]}" -eq 0 ]]; then
            echo \
              "No open generated pull request found for issue #${ISSUE_NUMBER}."
          fi

          for pull_request in "${pull_requests[@]}"; do
            echo "Closing pull request #${pull_request}."

            gh pr close "$pull_request" \
              --repo "$REPO" \
              --comment \
              "Closed automatically because OffMap submission issue #${ISSUE_NUMBER} was closed."
          done

      # ======================================================
      # DELETE CURRENT AND LEGACY GENERATED BRANCHES
      #
      # This also removes orphan branches whose pull request
      # had already been closed manually.
      # ======================================================

      - name: Delete generated branches
        shell: bash
        run: |
          set -euo pipefail

          current_branch="automated-discovery/issue-${ISSUE_NUMBER}"
          legacy_prefix="${current_branch}-"

          mapfile -t branch_refs < <(
            gh api \
              --paginate \
              "repos/${REPO}/git/matching-refs/heads/${current_branch}" \
              --jq \
              ".[] |
              select(
                (.ref == \"refs/heads/${current_branch}\")
                or
                (.ref | startswith(\"refs/heads/${legacy_prefix}\"))
              ) |
              .ref"
          )

          if [[ "${#branch_refs[@]}" -eq 0 ]]; then
            echo \
              "No generated branches found for issue #${ISSUE_NUMBER}."
          fi

          for branch_ref in "${branch_refs[@]}"; do
            branch_name="${branch_ref#refs/heads/}"

            echo "Deleting generated branch: ${branch_name}"

            gh api \
              --method DELETE \
              "repos/${REPO}/git/refs/heads/${branch_name}"
          done

      # ======================================================
      # DELETE TEMPORARY PROCESSING ARTIFACTS
      # ======================================================

      - name: Delete temporary processing artifacts
        shell: bash
        run: |
          set -euo pipefail

          artifact_name="opportunity-${ISSUE_NUMBER}-processing-records"

          mapfile -t artifact_ids < <(
            gh api \
              --paginate \
              "repos/${REPO}/actions/artifacts?per_page=100" \
              --jq \
              ".artifacts[] |
              select(.name == \"${artifact_name}\") |
              .id"
          )

          if [[ "${#artifact_ids[@]}" -eq 0 ]]; then
            echo \
              "No temporary artifacts found for issue #${ISSUE_NUMBER}."
          fi

          for artifact_id in "${artifact_ids[@]}"; do
            echo \
              "Deleting processing artifact ${artifact_id}."

            gh api \
              --method DELETE \
              "repos/${REPO}/actions/artifacts/${artifact_id}"
          done

      # ======================================================
      # SUMMARY
      # ======================================================

      - name: Report cleanup completion
        shell: bash
        run: |
          set -euo pipefail

          echo \
            "Cleanup completed for OffMap submission issue #${ISSUE_NUMBER}."
