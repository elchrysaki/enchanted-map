name: Process Opportunity Submission

on:
  issues:
    types:
      - opened

concurrency:
  group: enchanted-map-submission-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  models: read

jobs:
  process-submission:
    name: Research and prepare quest
    runs-on: ubuntu-latest

    if: contains(github.event.issue.labels.*.name, 'new-discovery')

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      AI_MODEL: openai/gpt-4.1

    steps:
      # ======================================================
      # SETUP
      # ======================================================

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      # ======================================================
      # COPY 1: PRESERVE THE ORIGINAL SUBMISSION
      # ======================================================

      - name: Preserve and parse raw submission
        id: intake
        env:
          OUTPUT_DIRECTORY: artifacts
          MODERATOR_FILE: .github/moderators.yml
        run: |
          python scripts/process_submission.py

      # ======================================================
      # COPY 2: RESEARCH AND ENRICH THE INFORMATION
      # ======================================================

      - name: Research official sources
        id: research
        env:
          RAW_SUBMISSION_FILE: ${{ steps.intake.outputs.raw_submission_file }}
          RESEARCH_PROMPT_FILE: .github/prompts/opportunity-researcher.md
          RESEARCH_OUTPUT_FILE: artifacts/researched-submission-${{ github.event.issue.number }}.json
        run: |
          python scripts/research_opportunity.py

      # ======================================================
      # COPY 3: CREATE THE POLISHED QUEST DRAFT
      # ======================================================

      - name: Format publishable quest content
        id: formatter
        env:
          RESEARCHED_SUBMISSION_FILE: ${{ steps.research.outputs.researched_submission_file }}
          FORMATTER_PROMPT_FILE: .github/prompts/opportunity-formatter.md
          PUBLISHABLE_OUTPUT_FILE: artifacts/publishable-content-${{ github.event.issue.number }}.json
        run: |
          python scripts/format_with_ai.py

      # ======================================================
      # GENERATE THE CLICKABLE OPPORTUNITY PAGE
      # ======================================================

      - name: Generate opportunity page
        id: generator
        env:
          RESEARCHED_SUBMISSION_FILE: ${{ steps.research.outputs.researched_submission_file }}
          PUBLISHABLE_CONTENT_FILE: ${{ steps.formatter.outputs.publishable_content_file }}
          OPPORTUNITIES_DIRECTORY: opportunities
        run: |
          python scripts/generate_opportunity.py

      # ======================================================
      # BUILD THE HUMAN MODERATOR REPORT
      # ======================================================

      - name: Build moderator review report
        id: review
        env:
          RESEARCHED_SUBMISSION_FILE: ${{ steps.research.outputs.researched_submission_file }}
          PUBLISHABLE_CONTENT_FILE: ${{ steps.formatter.outputs.publishable_content_file }}
          OPPORTUNITY_FILE: ${{ steps.generator.outputs.opportunity_file }}
          REVIEW_REPORT_FILE: artifacts/review-report-${{ github.event.issue.number }}.md
        run: |
          python scripts/build_review_report.py

      # ======================================================
      # CREATE OR UPDATE THE DRAFT PULL REQUEST
      # ======================================================

      - name: Create draft pull request
        id: pull_request
        env:
          RAW_SUBMISSION_FILE: ${{ steps.intake.outputs.raw_submission_file }}
          PUBLISHABLE_CONTENT_FILE: ${{ steps.formatter.outputs.publishable_content_file }}
          OPPORTUNITY_FILE: ${{ steps.generator.outputs.opportunity_file }}
          REVIEW_REPORT_FILE: ${{ steps.review.outputs.review_report_file }}
          MODERATORS: ${{ steps.intake.outputs.moderators }}
          BRANCH_PREFIX: automated-discovery
        run: |
          python scripts/create_pull_request.py

      # ======================================================
      # KEEP DEBUGGING RECORDS FOR SEVEN DAYS
      # ======================================================

      - name: Upload processing artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opportunity-${{ github.event.issue.number }}-processing-records
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7
