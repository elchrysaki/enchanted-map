name: Process OFFMAP Opportunity Submission

run-name: >-
  Process OFFMAP opportunity issue
  #${{ github.event_name == 'workflow_dispatch' && inputs.issue_number || github.event.issue.number }}

on:
  issues:
    types:
      - opened

  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub issue number to process or retry"
        required: true
        type: string

concurrency:
  group: >-
    offmap-submission-${{
      github.event_name == 'workflow_dispatch'
      && inputs.issue_number
      || github.event.issue.number
    }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  models: read

defaults:
  run:
    shell: bash

jobs:
  process-submission:
    name: Research and prepare opportunity
    runs-on: ubuntu-latest
    timeout-minutes: 30

    if: >-
      github.event_name == 'workflow_dispatch'
      || contains(
        github.event.issue.labels.*.name,
        'new-discovery'
      )

    env:
      GITHUB_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}

      ISSUE_NUMBER: >-
        ${{
          github.event_name == 'workflow_dispatch'
          && inputs.issue_number
          || github.event.issue.number
        }}

      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      AI_MODEL: openai/gpt-4.1

    steps:
      # ======================================================
      # SETUP
      # ======================================================

      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Validate workflow input
        run: |
          set -euo pipefail

          if [[ ! "$ISSUE_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error title=Invalid issue number::Issue number must be a positive integer."
            exit 1
          fi

          if [[ "$REPOSITORY" != "$GITHUB_REPOSITORY" ]]; then
            echo "::error::Repository context mismatch."
            exit 1
          fi

          echo "::notice title=Processing issue::Processing OFFMAP issue #$ISSUE_NUMBER"

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          set -euo pipefail

          python -m pip install \
            --disable-pip-version-check \
            -r requirements.txt

      # ======================================================
      # COPY 1: PRESERVE THE ORIGINAL SUBMISSION
      # ======================================================

      - name: Preserve and parse raw submission
        id: intake
        env:
          OUTPUT_DIRECTORY: artifacts
          MODERATOR_FILE: .github/moderators.yml
        run: |
          set -euo pipefail
          python scripts/process_submission.py

      - name: Verify intake produced its records
        run: |
          set -euo pipefail

          RAW_FILE="artifacts/raw-submission-${ISSUE_NUMBER}.json"

          if [[ ! -f "$RAW_FILE" ]]; then
            echo "::error title=Intake produced no record::$RAW_FILE was not created."
            exit 1
          fi

          SAFE_TO_RESEARCH="${{ steps.intake.outputs.safe_to_research }}"

          if [[ "$SAFE_TO_RESEARCH" != "true" && "$SAFE_TO_RESEARCH" != "false" ]]; then
            echo "::error title=Missing intake result::safe_to_research was not set to true or false."
            exit 1
          fi

          echo "Intake record verified: $RAW_FILE"
          echo "safe_to_research=$SAFE_TO_RESEARCH"

      - name: Record blocked intake
        if: >-
          steps.intake.outcome == 'success'
          && steps.intake.outputs.safe_to_research == 'false'
        run: |
          set -euo pipefail

          echo "::notice title=Submission held::Research was skipped because intake validation did not mark the submission safe to research."

      # ======================================================
      # COPY 2: RESEARCH AND ENRICH OFFICIAL INFORMATION
      # ======================================================

      - name: Research official sources
        id: research
        if: >-
          steps.intake.outputs.safe_to_research == 'true'
        env:
          RAW_SUBMISSION_FILE: ${{ steps.intake.outputs.raw_submission_file }}

          RESEARCH_PROMPT_FILE: >-
            .github/prompts/opportunity-researcher.md

          RESEARCH_OUTPUT_FILE: >-
            artifacts/researched-submission-${{ env.ISSUE_NUMBER }}.json
        run: |
          set -euo pipefail
          python scripts/research_opportunity.py

      # ======================================================
      # COPY 3: FORMAT THE PUBLISHABLE DRAFT
      # ======================================================

      - name: Format publishable opportunity content
        id: formatter
        if: >-
          steps.intake.outputs.safe_to_research == 'true'
          && steps.research.outcome == 'success'
        env:
          RESEARCHED_SUBMISSION_FILE: >-
            ${{ steps.research.outputs.researched_submission_file }}

          FORMATTER_PROMPT_FILE: >-
            .github/prompts/opportunity-formatter.md

          PUBLISHABLE_OUTPUT_FILE: >-
            artifacts/publishable-content-${{ env.ISSUE_NUMBER }}.json
        run: |
          set -euo pipefail
          python scripts/format_with_ai.py

      # ======================================================
      # GENERATE A REVIEWABLE MARKDOWN PAGE
      # ======================================================

      - name: Generate opportunity page
        id: generator
        if: >-
          steps.formatter.outcome == 'success'
          && steps.formatter.outputs.safe_to_generate_draft_page == 'true'
          && steps.formatter.outputs.formatter_recommended_action == 'continue-to-draft-pr'
        env:
          RESEARCHED_SUBMISSION_FILE: >-
            ${{ steps.research.outputs.researched_submission_file }}

          PUBLISHABLE_CONTENT_FILE: >-
            ${{ steps.formatter.outputs.publishable_content_file }}

          OPPORTUNITIES_DIRECTORY: opportunities
        run: |
          set -euo pipefail
          python scripts/generate_opportunity.py

      # ======================================================
      # BUILD THE HUMAN MODERATOR REPORT
      #
      # This runs after successful formatting even when the
      # formatter holds the record and no page is generated.
      # ======================================================

      - name: Build moderator review report
        id: review
        if: >-
          always()
          && steps.formatter.outcome == 'success'
        env:
          RESEARCHED_SUBMISSION_FILE: >-
            ${{ steps.research.outputs.researched_submission_file }}

          PUBLISHABLE_CONTENT_FILE: >-
            ${{ steps.formatter.outputs.publishable_content_file }}

          OPPORTUNITY_FILE: >-
            ${{ steps.generator.outputs.opportunity_file }}

          REVIEW_REPORT_FILE: >-
            artifacts/review-report-${{ env.ISSUE_NUMBER }}.md
        run: |
          set -euo pipefail
          python scripts/build_review_report.py

      - name: Record formatter hold
        if: >-
          always()
          && steps.formatter.outcome == 'success'
          && (
            steps.formatter.outputs.safe_to_generate_draft_page != 'true'
            || steps.formatter.outputs.formatter_recommended_action != 'continue-to-draft-pr'
          )
        run: |
          set -euo pipefail

          echo "::notice title=Opportunity held::No Markdown page or pull request was created."
          echo "::notice::Formatter recommendation: ${{ steps.formatter.outputs.formatter_recommended_action }}"

      # ======================================================
      # CREATE OR UPDATE THE DRAFT PULL REQUEST
      # ======================================================

      - name: Create or update draft pull request
        id: pull_request
        if: >-
          steps.generator.outcome == 'success'
          && steps.review.outcome == 'success'
          && steps.formatter.outputs.safe_to_generate_draft_page == 'true'
          && steps.formatter.outputs.formatter_recommended_action == 'continue-to-draft-pr'
        env:
          RAW_SUBMISSION_FILE: >-
            ${{ steps.intake.outputs.raw_submission_file }}

          PUBLISHABLE_CONTENT_FILE: >-
            ${{ steps.formatter.outputs.publishable_content_file }}

          OPPORTUNITY_FILE: >-
            ${{ steps.generator.outputs.opportunity_file }}

          REVIEW_REPORT_FILE: >-
            ${{ steps.review.outputs.review_report_file }}

          MODERATORS: >-
            ${{ steps.intake.outputs.moderators }}

          BRANCH_PREFIX: automated-discovery
        run: |
          set -euo pipefail
          python scripts/create_pull_request.py

      # ======================================================
      # PRESERVE DEBUGGING RECORDS FOR SEVEN DAYS
      # ======================================================

      - name: Upload processing artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: opportunity-${{ env.ISSUE_NUMBER }}-processing-records
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7
          overwrite: true
