name: "🗺️ Submit an Opportunity"
description: "Share a conference, hackathon, fellowship, scholarship, academy, exchange, or other student opportunity on OffMap."
title: "[Discovery]: "
labels:
  - "new-discovery"
  - "needs-review"

body:
  # ==========================================================
  # INTRODUCTION
  # ==========================================================

  - type: markdown
    attributes:
      value: |
        # 🗺️ Put an Opportunity on the Map

        Found something students should know about? 
        
        Start with the essential details. The quick selections and final section are optional, but they help the OffMap research and publish the opportunity faster.

        After submission:

        1. 🔎 The official sources are researched.
        2. 🤖 OffMap AI organizes the information and flags missing or conflicting details.
        3. ✨ A polished quest page is prepared.
        4. 🛡️ A human moderator reviews it before publication.

        **Your map. Your story. Your impact**

  # ==========================================================
  # PART I — ESSENTIAL DETAILS
  # ==========================================================

  - type: markdown
    attributes:
      value: |
        ## ⚔️ Part I — Essential Quest Details

        These are the only details required to submit an opportunity.

  - type: input
    id: opportunity_name
    attributes:
      label: "✨ Opportunity name"
      description: "Use the complete official name, or the closest name you found."
      placeholder: "Example: ESA Academy Space Systems Engineering Course"
    validations:
      required: true

  - type: dropdown
    id: main_category
    attributes:
      label: "🗂️ Main opportunity category"
      description: "Choose the broad section where this opportunity belongs."
      options:
        - Events
        - Internships
        - Competitions
        - Research
        - Fellowships
        - Scholarships
        - Courses and Training
        - Innovation and Entrepreneurship
        - Creative and Open Calls
        - Exchanges and Mobility
        - Volunteering
        - Other or Not Sure
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: "🧭 Quest category"
      description: "Choose the closest specific type. Select Other or Not Sure when none fits."
      options:
        - "Events — Conference"
        - "Events — Summit"
        - "Events — Forum"
        - "Events — Workshop or Seminar"
        - "Events — Networking Event"
        - "Events — Congress"
        - "Events — Cultural Program"

        - "Internships — Internship"
        - "Internships — Apprenticeship"
        - "Internships — Traineeship"

        - "Competitions — Competition"
        - "Competitions — Challenge"
        - "Competitions — Hackathon"

        - "Research — Research Program"
        - "Research — Research Placement"
        - "Research — Research Internship"

        - "Fellowships — Fellowship"
        - "Fellowships — Leadership Program"

        - "Scholarships — Scholarship"
        - "Scholarships — Grant"
        - "Scholarships — Travel Grant"

        - "Courses — Academy"
        - "Courses — Summer School"
        - "Courses — Winter School"
        - "Courses — Course or Training"
        - "Courses — Bootcamp"

        - "Innovation — Startup Program"
        - "Innovation — Accelerator"
        - "Innovation — Incubator"
        - "Innovation — Entrepreneurship Program"

        - "Creative — Creative Call"
        - "Creative — Media Call"
        - "Creative — Writing Call"
        - "Creative — Design Call"

        - "Exchange — Exchange Program"
        - "Exchange — Mobility Program"

        - "Volunteering — Volunteering Program"
        - "Volunteering — Service Program"

        - "Other or Not Sure"
    validations:
      required: true

  
  - type: input
    id: organizer
    attributes:
      label: "🏰 Organizer"
      description: "Name the university, company, institution, association, or community running the opportunity."
      placeholder: "Example: European Space Agency"
    validations:
      required: true

  - type: textarea
    id: short_description
    attributes:
      label: "📖 What is the opportunity?"
      description: "Two or three sentences are enough. Explain what participants do and why the opportunity seems useful."
      placeholder: |
        A technical program for university students interested in spacecraft systems.
        It includes expert lectures, practical activities, and international teamwork.
    validations:
      required: true

  - type: input
    id: official_website
    attributes:
      label: "🔗 Official or most reliable source"
      description: "Add the official opportunity page, organizer announcement, or most reliable source you found."
      placeholder: "https://example.org/opportunity"
    validations:
      required: true

  - type: input
    id: application_deadline
    attributes:
      label: "⏳ Application deadline"
      description: "Any readable format is accepted. Write Unknown, Rolling, or Not announced when necessary."
      placeholder: "5 September / 2027-09-05 / Rolling / Unknown"
    validations:
      required: true

  - type: dropdown
    id: opportunity_format
    attributes:
      label: "🧭 Format"
      description: "How does the opportunity take place?"
      options:
        - In person
        - Online
        - Hybrid
        - Travelling or multiple locations
        - Multiple formats
        - Not sure
    validations:
      required: true

  # ==========================================================
  # PART II — QUICK FILTERS
  # ==========================================================

  - type: markdown
    attributes:
      value: |
        ## 🎒 Part II — Quick Map Filters

        Everything below is optional.

        Select what you already know. You do not need to research missing information yourself.

  - type: dropdown
    id: geographic_eligibility
    attributes:
      label: "🌍 Who can apply geographically?"
      description: "Select every option that appears relevant."
      multiple: true
      options:
        - Worldwide
        - Africa
        - Asia
        - Europe
        - European Union or EEA
        - Latin America and the Caribbean
        - Middle East and North Africa
        - North America
        - Oceania
        - Host country only
        - Specific countries
        - Multiple countries or regions
        - No geographic restriction mentioned
        - Not sure

  - type: checkboxes
    id: academic_levels
    attributes:
      label: "🎓 Academic or career level"
      description: "Select every group that appears eligible."
      options:
        - label: "Secondary or high-school students"
        - label: "Vocational students"
        - label: "Undergraduate students"
        - label: "Master's students"
        - label: "Doctoral students"
        - label: "Postdoctoral researchers"
        - label: "Recent graduates"
        - label: "Early-career professionals"
        - label: "Professionals"
        - label: "Open to several levels"
        - label: "No academic restriction mentioned"
        - label: "Not sure"
    validations:
      required: false

  - type: dropdown
    id: broad_fields
    attributes:
      label: "🔬 Broad academic fields"
      description: "Select the main fields connected to the opportunity."
      multiple: true
      options:
        - Engineering and Technology
        - Computer Science and Artificial Intelligence
        - Mathematics and Statistics
        - Physics and Astronomy
        - Chemistry and Materials Science
        - Biology and Life Sciences
        - Medicine and Health
        - Environmental Science and Sustainability
        - Business and Economics
        - Entrepreneurship and Innovation
        - Law and Public Policy
        - Politics and International Relations
        - Social Sciences
        - Psychology and Behavioural Science
        - Education
        - Arts and Design
        - Humanities
        - Media and Communications
        - Architecture and Urban Planning
        - Agriculture and Food Science
        - Interdisciplinary
        - Open to all fields
        - Other
        - Not sure

  - type: checkboxes
    id: funding_support
    attributes:
      label: "💰 Funding, costs, and support"
      description: "Select every option that applies. Mixed arrangements are completely normal."
      options:
        - label: "Free to apply"
        - label: "Application fee required"
        - label: "Free to participate"
        - label: "Participation fee required"
        - label: "Full funding available"
        - label: "Partial funding available"
        - label: "Scholarships or fee waivers available"
        - label: "Travel covered or reimbursed"
        - label: "Accommodation covered or provided"
        - label: "Meals covered or provided"
        - label: "Stipend or salary provided"
        - label: "Prize money available"
        - label: "Visa support available"
        - label: "Accessibility support or accommodations available"
        - label: "Funding information is not stated"
        - label: "Other or mixed arrangement"
    validations:
      required: false
  
  - type: textarea
    id: funding_details
    attributes:
      label: "💳 Funding and benefits details"
      description: "Explain fees, reimbursements, scholarships, accessibility support, and anything else applicants should know."
      placeholder: |
        Example: There is a €50 participation fee, but accommodation, meals,
        local transport, and travel reimbursement are provided. Fee waivers
        and accessibility accommodations are available upon request.
    validations:
      required: false

  - type: dropdown
    id: audience_groups
    attributes:
      label: "🌈 Intended, encouraged, or eligible groups"
      description: "Select a group only when the opportunity explicitly mentions it."
      multiple: true
      options:
        - Women
        - Women in STEM
        - Underrepresented groups in STEM
        - First-generation or low-income students
        - Students with disabilities or neurodivergent students
        - International students
        - Refugees, displaced students, or migrant-background students
        - Ethnic, racial, or Indigenous minorities
        - LGBTQ+ students
        - Young researchers
        - Student founders
        - Rural or remote-community students
        - Another specific community
        - No particular group mentioned
        - Not sure
        
  - type: textarea
    id: audience_information
    attributes:
      label: "🫶 Exact audience or inclusion wording"
      description: |
        Add the organizer's exact wording or explain how the selected community relates to the opportunity.

        Mention whether the group is exclusively eligible, prioritised, encouraged to apply, or simply central to the programme.
      placeholder: |
        The organizer especially encourages applications from women studying engineering and technology.

        Or:

        The scholarship is available only to first-generation students.
  # ==========================================================
  # PART III — OPTIONAL DETAILS
  # ==========================================================

  - type: markdown
    attributes:
      value: |
        ## ✨ Part III — Add What You Know

        This section is optional.

        More information helps moderators work faster, but incomplete submissions are still welcome.

  - type: input
    id: application_link
    attributes:
      label: "🚪 Direct application link"
      description: "Add the direct application portal if you found it. The checker can search for it later."
      placeholder: "https://example.org/apply"

  - type: textarea
    id: host_location
    attributes:
      label: "📍 Host location"
      description: "Add the city, country, online setting, or multiple destinations."
      placeholder: |
        Brussels, Belgium

        Or:

        Online preparation followed by events in France and Germany.

  - type: textarea
    id: eligible_locations
    attributes:
      label: "🗺️ Specific eligible countries or regions"
      description: "Use this when eligibility covers several countries, regions, nationalities, or places of residence."
      placeholder: |
        Greece, Cyprus, Italy, and Spain

        Or:

        Students studying at universities in Sub-Saharan Africa.

  - type: textarea
    id: event_dates
    attributes:
      label: "📅 Event or program dates"
      description: "Include start dates, end dates, interview periods, or selection dates."
      placeholder: |
        Program: 10–15 November 2027
        Interviews: October 2027
        Results announced: late October

  - type: textarea
    id: specific_majors
    attributes:
      label: "🧠 Specific majors or specializations"
      description: "List specific degrees, disciplines, industries, or topics when known."
      placeholder: |
        Mechanical Engineering
        Aerospace Engineering
        Robotics
        Computer Science
        Industrial Design

  - type: textarea
    id: eligibility_details
    attributes:
      label: "🛂 Other eligibility requirements"
      description: "Mention age limits, language requirements, experience, nationality, residence, enrollment, or other restrictions."
      placeholder: |
        Applicants must be enrolled at a university.
        English proficiency is required.
        Participants must be under 30.

  - type: textarea
    id: application_requirements
    attributes:
      label: "🏹 Application requirements or selection process"
      description: "Mention required documents, interviews, nominations, portfolios, tests, teams, or selection stages."
      placeholder: |
        CV and motivation letter required.
        Shortlisted applicants complete an online interview.

  - type: textarea
    id: additional_information
    attributes:
      label: "📝 Anything else worth knowing?"
      description: "Add useful context, uncertainty, concerns, or information that did not fit elsewhere."
      placeholder: |
        I could not tell whether travel funding applies to all participants.
        The application portal may still show last year's edition.

  # ==========================================================
  # FINAL CHECK
  # ==========================================================

  - type: checkboxes
    id: confirmation
    attributes:
      label: "🛡️ Adventurer's check"
      options:
        - label: "I shared the most reliable source and information I could find."
          required: true
        - label: "I understand that AI and human moderators may research, correct, complete, or rewrite the information before publication."
          required: true

  - type: markdown
    attributes:
      value: |
        ## 🗺️ Your discovery is ready

        Submit what you know. OffMap handles the research, formatting, and human review.
        **Thank you so much for your contribution, we hope to welcome you as a contributor, in due time.**
