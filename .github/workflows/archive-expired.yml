name: Archive Expired OffMap Opportunities

on:
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:

concurrency:
  group: offmap-daily-archiving
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  archive-expired:
    name: Archive expired opportunities and rebuild pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BASE_REF: ${{ github.event.repository.default_branch }}

    steps:
      - name: Check out default branch
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          set -euo pipefail
          python -m pip install \
            --disable-pip-version-check \
            -r requirements.txt

      - name: Archive expired opportunities and rebuild public pages
        run: |
          set -euo pipefail
          python scripts/archive_expired.py
          python scripts/build_indexes.py
          python scripts/build_category_pages.py
          python scripts/update_closing_soon.py
          python scripts/update_readme_stats.py

      - name: Commit archive updates
        run: |
          set -euo pipefail

          git config user.name "offmap-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A -- \
            README.md \
            ARCHIVE.md \
            data/opportunities.json \
            opportunities/

          if git diff --cached --quiet; then
            echo "No expired opportunities or generated-page changes."
            exit 0
          fi

          git commit -m "Archive expired OffMap opportunities"

          git fetch origin "$BASE_REF"
          git rebase "origin/$BASE_REF"

          python scripts/archive_expired.py
          python scripts/build_indexes.py
          python scripts/build_category_pages.py
          python scripts/update_closing_soon.py
          python scripts/update_readme_stats.py

          git add -A -- \
            README.md \
            ARCHIVE.md \
            data/opportunities.json \
            opportunities/

          if ! git diff --cached --quiet; then
            git commit --amend --no-edit
          fi

          git push origin "HEAD:${BASE_REF}"
