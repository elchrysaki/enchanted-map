name: "🗺️ Submit a New Quest"
description: "Share an opportunity with students around the world."
title: "[Discovery]: "
labels:
  - "new-discovery"
  - "needs-review"
assignees:
  - "elchrysaki"

body:
  # ==========================================================
  # INTRODUCTION
  # ==========================================================

  - type: markdown
    attributes:
      value: |
        # 🦄 Add a Discovery to the Map

        Found a conference, hackathon, fellowship, scholarship, academy, exchange, or another worthwhile opportunity?

        Share the essential information first. The second section is optional, but anything you add helps the Guild research and publish it faster.

        After submission, AI will check the sources, complete missing details where possible, prepare a readable quest page, and send it to a human moderator for approval.

  # ==========================================================
  # PART ONE: ESSENTIAL DETAILS
  # ==========================================================

  - type: markdown
    attributes:
      value: |
        ## ⚔️ Part I — Essential Quest Details

        These are the only details required to submit your discovery.

  - type: input
    id: opportunity_name
    attributes:
      label: "✨ Opportunity name"
      description: "Use the official name, or the closest name you found."
      placeholder: "Example: ESA Academy Space Systems Course"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: "🧭 Quest category"
      description: "Choose the closest option. Moderators can correct it later."
      options:
        - Conference
        - Hackathon
        - Competition
        - Fellowship
        - Academy
        - Scholarship
        - Research Program
        - Exchange Program
        - Summer School
        - Internship
        - Workshop or Seminar
        - Bootcamp
        - Startup Program
        - Grant
        - Volunteering Program
        - Leadership Program
        - Cultural Program
        - Other or Not Sure
    validations:
      required: true

  - type: textarea
    id: short_description
    attributes:
      label: "📖 What is the opportunity?"
      description: "Two or three sentences are enough. Tell us what participants do and why it seems useful."
      placeholder: |
        A program for university students interested in spacecraft systems.
        It includes expert lectures, practical activities and international teamwork.
    validations:
      required: true

  - type: input
    id: official_website
    attributes:
      label: "🔗 Where did you find it?"
      description: "Add the official page, organizer announcement, application page or most reliable source you found."
      placeholder: "https://example.org/opportunity"
    validations:
      required: true

  - type: input
    id: application_deadline
    attributes:
      label: "⏳ Application deadline"
      description: "Any readable format is accepted. Write Unknown, Rolling or Not announced when needed."
      placeholder: "Example: 5 September / 2027-09-05 / Rolling / Unknown"
    validations:
      required: true

  # ==========================================================
  # PART TWO: OPTIONAL DETAILS
  # ==========================================================

  - type: markdown
    attributes:
      value: |
        ## ✨ Part II — Help the Guild Research Faster

        Everything below is optional.

        Add only what you already know. The checker will search the official sources for missing information.

  - type: input
    id: organizer
    attributes:
      label: "🏰 Organizer"
      description: "The university, company, institution, association or community running it."
      placeholder: "Example: European Space Agency"

  - type: input
    id: application_link
    attributes:
      label: "🚪 Direct application link"
      description: "Add it if you found it. The checker can search for it later."
      placeholder: "https://example.org/apply"

  - type: textarea
    id: event_dates
    attributes:
      label: "📅 Event or program dates"
      description: "Include start dates, end dates, interview periods or selection dates."
      placeholder: |
        Program: 10–15 November 2027
        Interviews take place in October.

  - type: textarea
    id: location_and_geography
    attributes:
      label: "🌍 Location and applicant geography"
      description: "Where does it happen, and where may applicants come from? Multiple countries or regions are completely fine."
      placeholder: |
        Hosted in Brussels, Belgium.
        Applicants may come from Europe, North Africa and the Middle East.

        Or:

        Fully online and open worldwide.

  - type: textarea
    id: academic_eligibility
    attributes:
      label: "🎓 Academic level and relevant majors"
      description: "Mention study level, subjects, experience or age limits if known."
      placeholder: |
        Undergraduate and master's students.
        Relevant majors include engineering, physics and computer science.
        Applicants must be under 30.

  - type: textarea
    id: funding_and_benefits
    attributes:
      label: "💰 Funding, costs and benefits"
      description: "Mention fees, scholarships, travel support, accommodation, meals, prizes, certificates or mentoring."
      placeholder: |
        Participation is free.
        Accommodation and meals are included.
        Limited travel grants are available.

  - type: textarea
    id: audience_information
    attributes:
      label: "🌈 Intended or priority groups"
      description: "Include this only when the official source mentions a particular community, priority group or eligibility restriction."
      placeholder: |
        Women in STEM are especially encouraged to apply.

        Or:

        The program is reserved for students from African universities.

  - type: textarea
    id: additional_information
    attributes:
      label: "📝 Anything else worth knowing?"
      description: "Add useful details, uncertainty, application requirements, or anything that may help the reviewer."
      placeholder: |
        A motivation letter and CV are required.
        I could not find whether travel support is guaranteed.

  # ==========================================================
  # FINAL CHECK
  # ==========================================================

  - type: checkboxes
    id: confirmation
    attributes:
      label: "🛡️ Final check"
      options:
        - label: "I shared the most reliable source I could find."
          required: true
        - label: "I understand that AI and human moderators may complete, correct or rewrite the information before publication."
          required: true

  - type: markdown
    attributes:
      value: |
        ## 🗺️ Ready to submit

        You bring the discovery. The Guild handles the research, formatting and review.
